services:
  - type: web
    name: techverse-api
    env: node
    plan: free
    buildCommand: pnpm install --prod=false && pnpm build
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
