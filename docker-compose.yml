version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: techverse_mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=secret

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: techverse_api
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://root:secret@mongodb:27017/techverse?authSource=admin
      - JWT_SECRET=techverse_super_secret_key
      - CLIENT_URL=http://localhost:3000
      - ADMIN_URL=http://localhost:3001

volumes:
  mongodb_data:
